name: redeploy
# Manually triggered workflow that:
#   1. Optionally builds + pushes a new image (if you bumped image tag in deploy.yaml)
#   2. Loads secrets from GH Secrets
#   3. Sends a deployment update + manifest to the existing Akash lease
#
# Trigger via the Actions tab → "Run workflow", or via:
#   gh workflow run redeploy --ref main
#
# Inputs:
#   image_tag (optional) — bump SDL to this tag and force a rebuild before deploy.
#                          Empty = don't rebuild, just re-send manifest.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'New image tag to build & push (leave empty to skip rebuild)'
        required: false
        default: ''
      force_send_manifest:
        description: 'Force send-manifest even if SDL unchanged'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build + push image (if image_tag provided)
        if: inputs.image_tag != ''
        run: |
          set -euo pipefail
          NEW_TAG="${{ inputs.image_tag }}"
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t "ghcr.io/${{ github.repository_owner }}/mantle-osmo-hermes-relayer:${NEW_TAG}" .
          docker push "ghcr.io/${{ github.repository_owner }}/mantle-osmo-hermes-relayer:${NEW_TAG}"
          # Update SDL to point at the new tag
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/mantle-osmo-hermes-relayer:.*|image: ghcr.io/${{ github.repository_owner }}/mantle-osmo-hermes-relayer:${NEW_TAG}|" deploy.yaml

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq gettext-base coreutils
          # cryptography for the AES-GCM mnemonic decrypt
          python3 -m pip install --quiet cryptography

      - name: Run redeploy
        env:
          RELAYER_MNEMONIC_ENC_BASE64:    ${{ secrets.RELAYER_MNEMONIC_ENC_BASE64 }}
          RELAYER_ENCRYPTION_KEY_BASE64:  ${{ secrets.RELAYER_ENCRYPTION_KEY_BASE64 }}
          RELAYER_ADDRESSES_JSON_BASE64:  ${{ secrets.RELAYER_ADDRESSES_JSON_BASE64 }}
          AKASH_KEYRING_TGZ_BASE64:       ${{ secrets.AKASH_KEYRING_TGZ_BASE64 }}
          GHCR_PAT:                       ${{ secrets.GHCR_PAT }}
          GH_TOKEN:                       ${{ secrets.GHCR_PAT }}
        run: |
          chmod +x scripts/load-secrets.sh scripts/redeploy-from-secrets.sh deploy.sh
          ./scripts/redeploy-from-secrets.sh

      - name: Show deployment state
        run: cat deployment-state.json | jq .
