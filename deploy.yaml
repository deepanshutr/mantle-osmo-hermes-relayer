---
# mantle-1 <-> osmosis-1 IBC Hermes relayer on Akash
# Provider target: zencloud.eu (continuity with rpc.assetmantle.one)
#
# IMAGE: this SDL references a custom wrapper image
#   ghcr.io/deepanshutr/mantle-osmo-hermes-relayer:<tag>
# built from ./Dockerfile in this directory. The wrapper bakes:
#   - informalsystems/hermes:1.13.1 (digest sha256:c2d8387f...3088c8)
#   - config.toml.template (Hermes 1.13 syntax)
#   - entrypoint.sh (envsubst + keys add + hermes start)
# See README.md "Build & publish" before first deploy.
#
# RELAYER_MNEMONIC is NOT in this template. deploy.sh renders
# deploy-rendered.yaml at deploy time, injecting the mnemonic decrypted
# from /home/deepanshutr/.relayer-akash/mnemonic.enc, then shreds the
# rendered file after the manifest is sent to the provider.

version: "2.1"

services:
  relayer:
    image: ghcr.io/deepanshutr/mantle-osmo-hermes-relayer:v0.1.8
    credentials:
      host: ghcr.io
      username: deepanshutr
      # password injected by deploy.sh from gh auth token at render time
      password: __GHCR_TOKEN__
    expose:
      # Hermes Prometheus telemetry. Auth-less; data is non-sensitive
      # (counter / histogram values for relayed packets, gas, etc.).
      - port: 3001
        as: 3001
        proto: tcp
        to:
          - global: true
    env:
      # Primary RPC endpoints (stakerhouse + Polkachu chosen for stability;
      # Polkachu publishes a matching gRPC for both chains, which Hermes needs).
      # Mantle RPC: polkachu is primary (relayer-friendly rate limit, valid
      # validator pubkey, ABCI responses preserved). rpc.assetmantle.one is
      # backup (our own aggregator on Akash DSEQ 26579018). The mantle-rpc-proxy
      # sidecar at 127.0.0.1:18903 is still baked but unused at runtime; it
      # was needed to recover orphan packets (publicnode's tx-index covers
      # historical send_packet heights at h~16.9M). With clear_interval=0
      # we no longer scan for orphans, so the proxy is dormant code.
      - MANTLE_RPC_PRIMARY=https://assetmantle-rpc.polkachu.com:443
      - MANTLE_RPC_BACKUP=https://rpc.assetmantle.one
      # Osmosis RPC selection (verified 2026-04-28 against hermes 1.13 pull mode):
      #   ✗ rpc.osmosis.zone:    persists ABCI but rate-limits HTTP 429 in <1min
      #   ✗ osmosis-rpc.polkachu.com: relayer-friendly but `discard_abci_responses=true`
      #                          → hermes errors "node is not persisting finalize block responses"
      #   ✗ osmosis-rpc.publicnode.com: stubbed validator pubkey (all-zero secp256k1)
      #                          → hermes errors "invalid secp256k1 key"
      #   ✓ osmosis.rpc.kjnodes.com: ABCI persisted, valid Ed25519 pubkey,
      #                          deepest archive (earliest 57.50M), 1.4 req/s sustained
      - OSMO_RPC_PRIMARY=https://osmosis.rpc.kjnodes.com:443
      - OSMO_RPC_BACKUP=https://rpc.osmosis.validatus.com:443
      # gRPC endpoints (REQUIRED by Hermes — verified 2026-04-27 via h2 probe).
      # mantle: Polkachu plaintext h2c on :14690 (returns PROTOCOL_ERROR on GET / -> alive gRPC)
      # osmo:   Polkachu plaintext h2c on :12590 (returns 415 -> alive gRPC)
      - MANTLE_GRPC=http://assetmantle-grpc.polkachu.com:14690
      # Osmosis gRPC: kjnodes provides TLS-wrapped gRPC at :443 (cleaner than
      # polkachu's plaintext h2c). polkachu's gRPC produced intermittent
      # 'transport error' under burst load during 2026-04-28 testing.
      - OSMO_GRPC=https://osmosis.grpc.kjnodes.com:443
      # WebSocket endpoints for the push event_source. If commented out,
      # entrypoint.sh derives them from the RPC primary by mapping
      # https->wss / http->ws and appending /websocket.
      # WebSocket (push event_source) is unused — config.toml.template uses
      # event_source = { mode = 'pull', interval = '30s' }. WS subscription
      # was unreliable on rpc.osmosis.zone during 2026-04-28 testing.
      - MANTLE_WS=wss://assetmantle-rpc.polkachu.com/websocket
      - OSMO_WS=wss://osmosis.rpc.kjnodes.com/websocket
      - LOG_LEVEL=info
      # RELAYER_MNEMONIC injected by deploy.sh; do not add here.
    params:
      storage:
        relayer-data:
          mount: /home/hermes/.hermes

profiles:
  compute:
    relayer:
      resources:
        cpu:
          units: 0.5
        # Hermes (Rust, multi-chain) sits around 250-400MB resident in
        # steady state. 768Mi gives headroom for `clear_on_start` scans
        # of busy channels and the Tendermint light-client header buffer.
        memory:
          size: 768Mi
        storage:
          - size: 512Mi
          - name: relayer-data
            size: 1Gi
            attributes:
              persistent: true
              class: beta3
  placement:
    zencloud:
      attributes:
        host: akash
      pricing:
        relayer:
          denom: uact
          amount: 100

deployment:
  relayer:
    zencloud:
      profile: relayer
      count: 1
